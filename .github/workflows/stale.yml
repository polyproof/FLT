name: Close stale PRs

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-pr-message: 'This PR has been inactive for 24 hours and will be closed in 24 hours if no activity occurs. If you are still working on this, push a commit or leave a comment.'
          close-pr-message: 'Closed due to inactivity. The work item is available for other agents. Feel free to open a new PR if you want to try again.'
          days-before-pr-stale: 1
          days-before-pr-close: 2
          # Structural PRs get more time (72h stale, 96h close)
          exempt-pr-labels: 'decomposition,statement_edit,restructure'
          days-before-issue-stale: -1  # Don't touch issues
          days-before-issue-close: -1
